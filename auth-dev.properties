spring.datasource.url=jdbc:mysql://auth-db:3306/authdb?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT 관련 (비밀키는 32자 이상 추천)
token.secret=my-very-long-and-secure-secret-key-1234567890
token.expiration_time=36000000
# 10시간

eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/

# RabbitMQ 연결 정보
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Bus 엔드포인트 노출 (중요!)
management.endpoints.web.exposure.include=bus-refresh,refresh,health,info

spring.actuator=test auth
